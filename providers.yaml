# Providers used by example layout
# They can be any program that outputs lines of json containing variables
# If you don't want to install nushell just rewrite the example providers in bash (and maybe make a pr)
clock:
  command:
    - nu
    - ~/.config/rat-bar/provider.nu
    - clock
    - --interval 1sec
cpu:
  command:
    - nu
    - ~/.config/rat-bar/provider.nu
    - cpu
    - --interval 1sec
    # List available sensors using the nu `sys temp` command
    - --temp_sensor 'k10temp Tccd1'
    # Number of load samples to keep for graph display usage
    - --acc_count 12
mem:
  command:
    - nu
    - ~/.config/rat-bar/provider.nu
    - mem
    - --interval 1sec
net:
  command:
    - nu
    - ~/.config/rat-bar/provider.nu
    - net
    - --interval 1sec
    # List available sensors using the nu `sys net` command
    - --device enp42s0
niri-window:
  command:
    - nu
    - ~/.config/rat-bar/provider.nu
    # No --interval because it sends focus events as they come in
    - niri-focus
now-playing:
  command:
    - nu
    - ~/.config/rat-bar/provider.nu
    - now-playing
    - --interval 1sec
    # Prioritize players of that state
    # --at_least playing will try to find any player that is playing, otherwise pick the first available one in your list
    # --at_least paused will make higher priority player show up, unless they are stopped
    # --at_least stopped will always make your highest priority player show up, unless it is not active at all
    - --at_least paused
    # Players showing up first in the list will get picked first to get displayed
    - --players [chromium,firefox]
nvidia:
  command:
    - nu
    - ~/.config/rat-bar/provider.nu
    - nvidia
    - --interval 1sec
    - --acc_count 12
battery:
  command:
    - nu
    - ~/.config/rat-bar/provider.nu
    - nvidia
    - --interval 1sec
    # List devices using ls /sys/class/power_supply
    - --device BAT0
